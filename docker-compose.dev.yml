services:
  backend:
    build:
      context: ./backend
      dockerfile: dockerfile.dev
    ports:
      - "5000:3000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile.dev
    ports:
      - "3000:5173"
    env_file:
      - ./frontend/.env
    environment:
      - VITE_API_URL=http://localhost:5000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
