services:
  backend:
    container_name: taller-secco-backend
    build:
      context: .
      dockerfile: dockerfile.dev
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - backend_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    restart: unless-stopped

volumes:
  backend_node_modules:
